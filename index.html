<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación a comer pastas 🍝</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#ffb347,#ff7b00);
      overflow:hidden;
    }

    .container{
      background:#fff8f0;
      padding:40px;
      border-radius:25px;
      width:90%;
      max-width:500px;
      text-align:center;
      box-shadow:0 15px 35px rgba(0,0,0,0.2);
      position:relative;
      border:4px solid #ff9d00;
    }

    .emoji{
      font-size:75px;
      margin-bottom:10px;
      animation: float 2s infinite ease-in-out;
    }

    h1{
      color:#ff6b00;
      font-size:2.2rem;
      margin-bottom:15px;
    }

    p{
      color:#6b4a2b;
      margin-bottom:25px;
      line-height:1.5;
      font-size:1.05rem;
    }

    input{
      width:100%;
      padding:15px;
      border-radius:15px;
      border:2px solid #ffb347;
      outline:none;
      font-size:16px;
      margin-bottom:30px;
      background:white;
      color:#444;
    }

    .buttons{
      position:relative;
      height:100px;
    }

    button{
      position:absolute;
      border:none;
      padding:15px 35px;
      border-radius:15px;
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
      transition:0.2s;
    }

    #yesBtn{
      left:70px;
      background:linear-gradient(135deg,#ff8c00,#ff5e00);
      color:white;
      box-shadow:0 10px 20px rgba(255,115,0,0.4);
    }

    #yesBtn:hover{
      transform:scale(1.08);
    }

    #noBtn{
      right:70px;
      background:#ffe0b3;
      color:#8b5a2b;
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-10px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    .heart{
      position:absolute;
      color:#ff7b00;
      font-size:22px;
      animation: rise 4s linear infinite;
      opacity:0;
      pointer-events:none;
    }

    @keyframes rise{
      0%{
        transform:translateY(0) scale(0.5);
        opacity:0;
      }

      20%{
        opacity:1;
      }

      100%{
        transform:translateY(-900px) scale(1.5);
        opacity:0;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="emoji">🍝</div>

    <h1>¿Querés salir conmigo a comer pastas libres?</h1>

    <p>
     ¿Que sabado estas libre?
    </p>

    <input type="date" id="fecha">

    <div class="buttons">

      <button id="yesBtn">
        Sí 
      </button>

      <button id="noBtn">
        No
      </button>

    </div>

  </div>

  <script>

    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");

    // BOTÓN NO ESCAPANDO
    noBtn.addEventListener("mouseover", () => {

      const randomX = Math.floor(Math.random() * 300) - 150;
      const randomY = Math.floor(Math.random() * 200) - 100;

      noBtn.style.transform =
      `translate(${randomX}px, ${randomY}px)`;

    });

    // CLICK EN SI
    yesBtn.addEventListener("click", () => {

      const fecha =
      document.getElementById("fecha").value;

      if(fecha === ""){
        alert("Elegí una fecha 🍝");
        return;
      }

      // MENSAJE WHATSAPP
      const mensaje =
`Hola 💖

Aceptaron la cita para comer pastas libres 🍝

📅 Fecha elegida: ${fecha}`;

      const whatsappURL =
`https://wa.me/5411577358?text=${encodeURIComponent(mensaje)}`;

      // NUEVA PANTALLA
      document.body.innerHTML = `

      <div style="
        width:100%;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        text-align:center;
        background:linear-gradient(135deg,#ffb347,#ff7b00);
        color:white;
        padding:20px;
      ">

        <div style="
          font-size:90px;
          margin-bottom:20px;
        ">
          🍝💖
        </div>

        <h1 style="
          font-size:3rem;
          margin-bottom:20px;
        ">
          Gracias por aceptar la cita
        </h1>

        <p style="
          font-size:1.3rem;
          max-width:600px;
        ">
          Ya quedó agendada nuestra salida
          a comer pastas libres 😌
        </p>

      </div>

      `;

      // CORAZONES FLOTANDO
      setInterval(() => {

        const heart =
        document.createElement("div");

        heart.classList.add("heart");

        heart.innerHTML = "🧡";

        heart.style.left =
        Math.random() * window.innerWidth + "px";

        heart.style.top =
        window.innerHeight + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 4000);

      }, 250);

      // ABRIR WHATSAPP
      setTimeout(() => {
        window.open(whatsappURL, "_blank");
      }, 1500);

    });

  </script>

</body>
</html>
